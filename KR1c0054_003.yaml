body:
  text: 續詩傳鳥名卷卷三翰林院檢討毛竒齡撰小宛交交桑扈率場啄粟桑扈竊脂也俗呼青觜食肉不食粟桑扈雀名一名竊脂按春秋傳農正九扈其第八扈名桑扈亦名竊脂但此桑扈有兩鳥即竊脂亦有兩義此竊脂是盜竊之竊脂者肥也舊注謂此鳥青色又名青雀好竊人脯肉及筒中膏故以名淮南子所云桑扈不食粟者此一竊脂也若後桑扈篇則又一竊脂少皥九扈有夏扈竊玄秋扈竊藍冬扈竊黃棘扈竊丹與桑扈竊脂同作農正則此竊字讀作淺猶釋獸虎竊毛名虦是虎之淺毛者故竊玄竊黃謂淺玄色淺黃色其云脂者以脂色正白竊脂者淺白色也若又云有鶯其羽以身雖淺白而翅與項領又别有文章故曰鶯言猶鶯之明絢然也此又一竊脂也此則農正之第八扈也青雀非是也夫以青雀之好食肉而循場以啄粟失其宜矣舊注竊脂俗謂之青雀觜曲食肉而他注引之或失雀字竟以觜曲之觜字連上曰青觜亦誤小辨辨彼鸒斯辨飛拊翼貌鸒雅烏也小而多羣腹下白江東呼為鴨烏斯語詞也鸒斯一名鵯鶋亦作卑居即雅鳥也其又名鵯烏祗鵯居之别出者雖鵯本音匹然非鴨也集注作鴨烏誤矣且此是鸒斯與詩序稱螽斯同從來並無稱鸒一字為鳥名者雖斯字或本詩文然久已稱之不得援鹿斯柳斯強爭作助詞也猶之呼天為彼蒼即不得援陟彼崔嵬謂彼不是山嘒彼小星謂彼不是星也向使以柳為柳斯則亦柳斯矣况鸒斯之名久無同異師曠禽經早稱鸒斯爾雅鸒斯鵯鶋楊子頻頻之黨甚于鸒斯即劉孝標類苑鳥部亦立鸒斯之目下此顧野王玉篇孔氏小爾雅注丁度集韻皆以鸒斯連稱而諸凡字書及較定六書者皆并以斯加鳥傍另出􅠿字則以假此識字之人而思合諸書而盡廢之不亦難乎辨與卞通漢杜欽傳以小辨作小卞而卞訓躁疾春秋傳邾莊卞急故辨者急疾之貌禮記辨行剡剡起屨注急疾也鸒斯如彼急疾者以歸飛故也集注總誤解雉之朝雊雉見前四月匪鶉匪鳶鶉雕也鳶亦鷙鳥也以鶉為雕本襲舊注然不著所自則直誤注耳豈可為訓按鶉有三音分作三鳥二音淳如陳切則䳺鶉也一音筍思允切則隼也一音團徒官切則雕也故以鶉作雕當云鶉本作音徒官切與鳶一類其飛皆能戾天者特鶉與通字故詩亦作鶉此在毛傳爾雅廣雅説文玉篇廣韻集韻韻會諸書引釋甚明近作字書者反變亂字學謂以作鶉是改經字相沿致誤殊不知此通字非改字也説文引詩文直作匪集韻云今本詩作鶉然亦有仍書字者是鶉之與總是詩字與鴟梟之改鷦鷯不同鳶爾雅烏屬鄭氏謂鴟類倉頡字詁謂鳶即是鴟實則鳶鴟本一類而鳶較鴟小每搏擊衆鳥必翺翔審視而後下之故常見其戾天舒翼相羊不搖捩而乘風以行爾雅曰其飛也翔抱璞子謂鳶在下無力及至乎上則聳身直翅飛鳶操所云六翮不動凝飛煙皆是也桑扈交交桑扈桑扈見前小宛詩鴛鴦鴛鴦于飛鴛鴦在梁戢其左翼戢左翼謂並棲而相依也鴛鴦鳧屬然以其有匹又名匹鳥埤雅雄鳴曰鴛雌鳴曰鴦今人家多豢之身具五彩而首戴碧纓爾雅翼反指此為鸂鶒此謬誤者但其名匹鳥古今注云雌雄未嘗暫離止相依而飛則雙此曰于飛正言兩鳥之共飛也與黃鳥于飛不同戢左翼不可解據正義謂舉雄者言此襲爾雅辨雌雄法以右翼掩左翼者為雄左翼掩右翼者為雌故云然此是戢非掩也且戢左翼非掩右翼也乃後人承其誤者如函史諸書且謂雄以右翼掩雌左翼謂之戢左翼則以掩雌翼而曰戢雌翼已自難通况雌翼而曰其翼可乎且未聞禽鳥之宿有以彼翼掩此翼者若集注並棲相依則茫然無謂胡突甚矣惟宋人張載有云禽鳥並棲一正一倒戢左翼以相依于內舒右翼以防患于外世多稱之苐鳥棲正倒在枝丫者不可見鴛鴦連跖塌地而宿皆首尾相並有何正倒况正倒亦安必左翼內而右翼外假使西首者棲南東首者棲北則己右翼內而左翼外矣可曰右相依左防患乎且猶是兩翼何以右翼可防患又且鳬雁之類豢畜甚多豈有當棲宿而一翼斂一翼舒者此真宋人無稽杜撰不考驗之言此惟韓詩所解稍可通證戢者捷也謂捷其噣於左也凡禽鳥止息毋論長頸短喙必捷其噣于左翼此明可按者而戢音通捷又通唼楚詞靈修既信椒蘭之唼佞兮又通插周禮廬人矜所捷注捷為插則止一戢字而連插唼以為文此庶于經義物理兩不相悖當世多學人盍亦正之張風林曰廣雅戢插也原是明白車牽有集維鷮鷮鳥名鷮雉類而小于雉走而且鳴其鳴鷮鷮然故薛綜曰雉之健者為鷮尾長六尺漢秉輿常用之或曰詩序以車舝為刺幽王必以鷮之鷮健作哲婦之刺而實不然文華雄盛正方碩女觀春秋傳叔孫昭子聘宋為賦車舝時將為季孫迎宋公女而所賦及此則鷮可知矣白華有鶖在梁有鶴在林鶖秃鶖也鶖鶴皆以魚為食然鶴之與鶖清濁則有間矣今鶖在梁鶴在林鶖則飽而鶴則飢矣鶖水鳥長頸赤目身青黑色魯都賦以蔥鶖名之但頭頸無毛故又名秃鶖若又名鵚則舊字書凡鳥部單名概加以鳥傍此無足怪者獨其與鶴較則靈頑懸絶何止清濁有間祗二鳥同好食魚而鶴亷鶖貪亦且乖反如此此可嘆耳北魏崔光指鶖為叨餮之禽鶴見前鶴與鵠通字國策魏文侯使獻鵠于齊一作獻鶴漢時黃鵠下太液池一作黃鶴故别鶴操亦名别鵠操樂府飛來雙白鶴亦稱雙白鵠甚至劉孝標辨命論直稱龜鵠千秋曹昶搗衣詩亦云開緼舒龜鵠因有疑此鶴字是鵠字以為鶖鶴不倫惟鴻鵠鶖鶬皆水鳥一類不知鶴亦水鳥生淮之海州淮南子鴻鵠鶬鶴吳都賦鸘鵠鶄鶴未嘗不並稱也鶴鵠本兩鳥但古字相通耳今作字書者必彼此交訐謂鶴即是鵠謂鶴必不是鵠皆拘墟眇通之言鴛鴦在梁鴛鴦見前綿蠻綿蠻黃鳥黃鳥見前大雅大明時維鷹揚鷹見前旱麓鳶飛戾天鳶見前靈臺白鳥翯翯翯翯潔白貌白鳥鶴也鶴古㿥字説文謂鳥之白者曰㿥故孟子白鳥鶴鶴何晏景福殿賦作白鳥㿥㿥是也又鶴古鶮字史秦始紀屯蒲鶮即蒲鶮二邑名而鶮即翯字故詩白為翯翯孟子作白鳥鶴鶴是也然則白鶴鶴鶴可乎曰鶴之名鶴以其色猶鵠之名鵠以其聲也白鶴鶴鶴猶顔師古注漢書曰鵠聲鵠鵠也禽經曰鵠以哠為音故聲鵠鵠則鶴以翯為色不可曰其色鶴鶴乎則白鳥非鶴乎鳧鷖鳧鷖在涇鳧水鳥如鴨鷖鷗也鳧見前鷖與鳧一類一名水梟惟蒼頡解詁謂鷖即是鷗鷖鷗聲轉若漢書相如傳則又作翳翳鷖同鳧鷖偶興公尸耳何楷作世本古義謂逸周書有鳧旌男子所執周禮有鷖總王后所用故以之興考妣雖不無太鑿然猶勝杜撰之言涇非水名若然則下沙渚何解涇涏者直流之水也卷阿鳳凰于飛翽翽其羽亦集爰止亦傅于天鳳凰靈鳥也雄曰鳳雌曰凰翽翽羽聲鄭氏以為因時鳳凰至故以為喻理或然也鳳凰舊以為神鳥亦為靈鳥則凡諸瑞應圖録所云身備五彩質具五德合九苞而展六象容有其事况韓詩外傳載黃帝問天老歷言其狀似非無據但古以鳳鳥氏為厯正非時不至故尚書舜時鳳凰來儀春秋傳我少皥摯之立也鳳鳥適至世紀白虎通皆云黃帝時鳳凰止于東閣恐周成時未必有此且亦祗鄭箋言之不見他書則其所云亦集爰止苐泛舉如是耳唯徐仲山日記云韓詩載天老語謂鳳生于東方之國且夫子嘆鳳鳥不至則亦時可至者故漢宣之世鳳亦屢見雖黃霸傳以鶡雀為神爵光武時𢎞農上言鳳至辨之是鸞鳥然漢宣諸詔皆謂鳳文章五色羣鳥四面行列嚮鳳立以萬數而光武時五鳳並集東觀記謂鳳髙八尺五彩羣鳥並從行列蓋地數頃停一十七日即後周廣順二年史稱帝在乾德殿忽報有大鳥身髙八九尺朱冠彩羽燁然五色璀璨羣鳥隨之蔽天而至集西苑帝往觀之隨即飛去此是真鳳與京房易傳所云鳳髙丈二尺山海經所云鳳備五彩五文爾雅疏所云鳳飛則羣鳥隨以萬數蔽天而至無一不合此要非他鳥所能託者觀此則亦何疑于周成矣蔡雍琴操有神鳳操謝希逸琴論謂是周成王時鳳舞于紫庭而作其詞曰鳳凰翔兮于紫庭我何德兮以感靈豈周時鳳來原不止鳴岐山耶尚書周公曰我則鳴鳥不聞豈周公在時鳳未至耶張風林曰竹書周成王三十三年遊于卷阿召康公作詩與詩序合則鳳至在周公亡後耳亦傅于天不必謂羣鳥從者亦傅天也謂鳳雖爰止然亦翺翔耳宋玉對楚王問鳳凰上擊九千里絶雲霓負蒼天鳳凰鳴矣鳳凰之性非梧桐不棲非竹實不食鳳凰鳴與梧桐生兩物並興故下以菶萋噰喈雙承之乃又襲舊注謂鳳凰非梧桐不棲以梧桐為鳳凰而生必梧桐生髙岡而鳳則鳴之則髙岡與朝陽復出且鳳當鳴梧桐不當鳴髙岡矣此與秦苻堅時長安謡曰鳳凰止阿房堅乃植桐梧并竹數十萬于阿城以待之不同一艾子乎瞻卭為梟為鴟梟鴟惡聲之鳥也梟惡鳥又名不孝鳥舊稱梟生子以百日及子長生羽翼則食母而飛故古以春祠用梟祀黃帝遇至日則磔梟懸首于木説文謂古制梟字即以鳥頭絓木上為義懲其惡也則此哲婦為梟是惡鳥非惡聲之鳥惡聲鳥是梟即鴟梟不是梟梟與梟兩物不得錯認下文長舌字以婦之長舌誣坐鳥也且梟與鴟不連名梟鴟自舊儒作釋鳥書者多鶻突不能分别每以梟梟鴟三物混立名色因有茅鴟怪鴟梟鴟鵵鴟諸名致名此梟為梟鴟别名土梟土鴟與下文為鴟文相亂而注者亦遂曚曨曰梟鴟不知鴟鳶屬另一鳥也祗梟本惡鳥欲絶其類故漢儀以夏日至賜百官梟羮且解者云夏至微隂始起長養萬物而梟害其母因以是日殺之乃説文又云梟食母不孝故冬至捕殺梟首絶其類許慎漢人不應與漢儀反豈漢制兩至皆殺梟而説不厭煩故兩書各記其一與若史記留侯世家稱楚梟將前髙帝紀北貉燕人來致梟騎則以將兵本凶事但執法令不顧親戚有如梟然此與哲婦之貽禍君親同一比類而用意不同鴟似鷹稍小尾如舟舵善髙翔陸佃云古人觀魚翼創櫓視鴟尾制舵每呼嘯能致雨并聚衆鳥故禽經曰鴟以貪顧以愁嘯其嘯聲則每以丁字始而連作倐倐聲以終之亦惡鳥也但梟與鴟本一類同惡故連言之如楚詞斥逐鴻鵲近習鴟梟賈誼賦鸞鳳竄伏鴟梟翺翔類然實是二物唐光啓二年慈州梟與鴟鬬相殺則其為二物公然可知周頌振鷺振鷺于飛振羣飛貌鷺見前既曰振又曰飛似乎雜出故舊儒皆以振鷺為鷺名加以鳥傍如左思蜀都賦鴻儔鶴侣振鷺鵜鶘而顧野王作玉篇直出䳲字曰䳲鷺鷺名因之切韻集韻諸字書皆有䳲字然豫謂振戛也凡鳥將飛必先戛其羽原與飛字無涉况魯頌有駜振振鷺鷺于飛則振鷺于飛五字依然復出注經不信經而信儒説不可矣特振鷺是奮起之振乃解作羣飛則羣飛鷺于飛恐詩又無是語耳小毖肇允彼桃蟲拚飛惟鳥桃蟲鷦鷯小鳥也拚飛貌鳥大鳥也鷦鷯之雛化而為雕故古語曰鷦鷯生雕言始小而終大也桃蟲一名桃雀即鷦鷯又作鷦􅛯俗呼黃脰鳥鳥中之最小者爾雅鳭鷯桃蟲鸋鴂皆即此物其或稱鷦一字者以字書不兼出遂成單名猶鶺鴒稱鴒鶗鴂稱鴂也苐此鳥工于為巢莊子所云鷦鷯巢于一枝説苑謂鶴鷯巢葦苕間繫之以髮取茅秀為窩以麻紩之如刺襪然故又名襪雀郭璞謂之巧婦祗其所棲所食俱不在桃而名桃蟲者以喙鋭如錐専剖葦中蟲食之謂之掏蟲掏桃通字耳若毛傳云桃蟲始小終大之鳥此就詩意言之乃陸璣謂桃蟲之雛能化為雕而人多不信謂物無以小化大者且世亦罕見則造物變化安問大小鳩化為鷹鷹未嘗小于鳩也若以罕見為辭則誰曽見雀為蛤田鼠為鴽者此真少所見多所怪也特集注謂桃蟲小鳥鳥是大鳥則詩祗一鳥字何得增字以立説且拚飛與物化亦不合張氏詩紀有云微物不可忽動即可慮初聞桃蟲名以為蟲耳及拚飛而始信為鳥蓋初視為鼠不知其為虎也此深懲乎殷遺之可患也此又一説也魯頌有駜振振鷺鷺于下鼓咽咽醉言舞振振羣飛貌鷺鷺羽舞者所持或坐或伏如鷺之下鷺見前此以鷺之振振興鼓之咽咽振即前振鷺之振言振之又振非羣飛也且祗一鷺字明是鳥名乃又因下文有醉言舞句謂是鷺羽即舞者所執之物則下文又有醉言歸句醉並不舞此鷺將作何物耶説詩患穿鑿如此詩集注以舞解鷺舊又有以鼓解鷺者因此詩振鷺下適有鼓咽咽句即陳詩值其鷺羽亦適有坎坎擊鼓句于是作樂府者謂楚威王有朱鷺飛翔遂以朱鷺作鼓吹曲而漢作鐃歌亦云漢初有朱鷺之瑞始以鷺飾鼓至隋書樂志且謂建鼓殷時所作不知何代又加翔鷺于建鼓之上因之作詩説者謂鷺是鼓精越王句踐曽作大鼓以厭吳及晉時移鼓建康有雙鷺破鼓飛去此皆鼓與鷺有感召者故擊鼓必值鷺鼓咽咽必舞鷺其為説非不新異但無實證據祗以後世小説家説詩詩不受也夫以朱鷺作鼓吹曲此是橫吹又名鐃吹係行軍時馬上所作苐有吹並無鼓也若以鷺飾鼓或飾鼓柱則古凡飾器何所取應褕翟不必感雉雊犧尊未嘗召牛飲也至鼓出雙鷺則無稽之談彼此不一舊會稽志又謂會稽雙鶴曽飛入雷門鼓中於是鼓聲聞洛陽及雙鶴飛去而鼓聲寂然則又是鶴不是鷺將何應焉乃羅願無學妄作爾雅翼謂陳詩值其鷺羽不是舞羽考工記梓人為筍簴當刻裸者羽者鱗者于其上此既坎坎擊鼓則懸鼓之簴必刻鷺羽故云值其鷺羽謂植懸鼓之筍簴也非植羽也據此則下文坎坎擊缶值其鷺翿已不可通缶器非可懸之樂翿纛非刻飾之物况筍簴但懸鐘磬並不懸鼓若刻羽之簴則但懸磬即鐘亦不懸者又且所刻之羽是決吻鵳脰小體騫腹一短喙局足之鳥並不是鷺魯頌明是鷺而改作舞羽陳詩明是舞羽又改作筍簴之羽徒知改前説而不知疏陋之胸無一不錯六經何不幸而展轉遭厄遂至如此泮水翩彼飛梟集于泮林食我桑黮懷我好音梟惡聲之鳥也黮桑實也梟即鴟梟見前本惡聲之鳥周官司冦硩蔟氏掌覆夭鳥之巢惡其惡聲惟春晚食桑黮則變其音故毛傳云食黮而音美大抵梟好夜鳴每倚樹作擊刮之聲似呼快降者有時噓嘯作咻嘐之聲似呼休留者故一名快降鳥一名休留鳥至變音則咿唔綿長如夢中鼾齁然故又名呼春鳥又名春哥兒哥者歌也謂音如歌也世説張天錫為孝武所器有嫉之者於坐問張北方何物可貴張云桑黮甘香鴟梟革響醇酪養性人無嫉心正用此詩句若劉協云梟音之醜豈有泮林而變好則以已不識物理而反憎詩句詩焉受之商頌玄鳥天命玄鳥降而生商玄鳥鳦也春分玄鳥降髙辛氏之妃有娀氏女簡狄祈于郊禖鳦遺卵簡狄吞之而生契事見史記玄鳥燕名以羽玄見稱與黃鳥同或曰燕名玄鳥雁名朱鳥以去來之候各分隂陽燕以從隂稱玄鳥猶之雁以從陽稱朱鳥不惟色也若有娀吞鳦則不經之事在上古容有之或謂玄鳥降即月令玄鳥至有城氏于玄鳥至日祠髙禖生契不必吞鳦此亦以意説詩之言續詩傳鳥名卷卷三
