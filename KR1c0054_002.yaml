body:
  text: 續詩𫝊鳥名卷卷二翰林院檢討毛竒齡撰秦風黃鳥交交黃鳥交交飛而往來之貌黃鳥見前但此交交正黃鳥之以聲見者徒以交字無口傍而注作往來按集韻交通作膠鳥聲詩雞鳴膠膠是也又通作咬嵇康詩咬咬黃鳥則直用此句晨風鴥彼晨風鬱彼北林鴥疾飛貌晨風鸇也晨風亦作鷐風是鸇名以其搖翅疾飛如朝風之發故名晨風鴥彼者鳥飛疾也鬱彼北林者謂鳥飛鴥然適當彼北林之鬱然也此在爾雅說文玉篇後無異解者惟六書故云晨風即朝風非鸇也李陵别蘇武詩願因晨風發送子以賤軀豈亦鸇耶徐氏日記辨之曰此正鸇也鳥以發為舉魚以舉為發舉與發字義並同此鸇發即是鸇舉若曰願因鸇舉時託賤軀以送子耳若是朝風則古詩亮無晨風翼焉能凌風飛朝風無翼矣若曹丕清河之作則直下鳥字曰願為晨風鳥雙飛翔北林夫明指為鳥何朝風乎陳風宛丘值其鷺羽值其鷺翿值植也鷺舂鉏今鷺鷥好而潔白頭上有白毛十數枚羽以其羽為翳舞者持以指麾也鷺水鳥亦名白鷺通體潔白翅背上皆有長翰毛可為飾用不止頂上戴羽絲也其又名舂鉏者陸佃曰鷺好涉淺水以項作低仰而行如舂如鉏故以云非有他也鷺羽即鷺翿以其羽為翿耳舊謂羽為舞者之翳翿為舞者之導則不然爾雅翿謂之纛纛謂之翳李巡孫炎皆謂是舞者所執之羽但有異名者以羽舞所用原有兩羽其名翟者是雉羽但執之以舞而名翿者是鷺羽則以之為纛而執之以指麾于舞者之列使舞者或坐或伏皆低仰有節一如周禮行匶時鄉師執纛指麾使匠氏挽匶者得正其行列進退故謂之纛纛者導也即翿也是猶是鷺羽而在未舞時可以自蔽及既舞而起而導之翿與翳又何異焉蓋翿用鷺羽雖以羽白易觀見然亦以鷺行立有序故正朝位者名鶚立亦名鷺序又且指麾髙下有似乎鷺行之作低仰者故鄉師所用纛未知何羽然白羽與喪導正合定不出此若蔡雍獨斷謂乘輿以旄牛尾為纛此是漢制所云黃屋左纛者豈可為據弼風簡兮右手秉翟此舞者所執王風君子陽陽左執翿此導舞者所執各不同墓門有梟萃止鴟梟惡聲之鳥也梟即鴟梟舊作梟又作山梟即土梟俱非其鳥狀如母雞猫首而鳬趾一名鴟鵂鵂梟聲轉其又名鵂鶹則又以聲似休留稱之但一名禍鳥每至人家多不祥周官硩蔟氏呼為妖鳥專設一官覆其巢殺其肉為炙一如漢制之絶梟鳥者故曰禍鳥可為炙莊子見彈而思梟炙惟胖不可食內則所云鵠梟胖者凡食炙必舍胖而食其餘漢時供御膳各隨其時獨梟炙冬夏常施欲絶其類也詩序以墓門為刺陳他不良故以梟比之若舊𫝊以為即是鵩則賈誼傳明云有鵩似梟至賈生舍言似梟則梟豈鵩乎天問何繁鳥萃棘而婦子肆情注繁鳥􅬠鳥也顧野王玉篇及集韻廣韻皆以􅬠鳥為鴟梟别名其云萃棘即用此詩句曹風候人維鵜在梁鵜汙澤水鳥俗所謂淘河也鵜即鵜鶘水鳥别名汙澤又呼為淘河見郭注但其名淘河似鵜淘鶘河一聲轉耳若汙澤則又以涸澤取魚為義陸璣曰鵜形如鶚而大喙長尺餘口中正赤頷下胡大如數升囊小澤有魚共抒水滿其胡而棄之水竭魚出乃食魚莊子曰魚不畏網罟而畏鵜鶘或云以其能竭澤也鵜鶘本水鳥且善捕魚而在梁又且不濡其翼與其咮似刺賢人不用與下文季女斯饑同意而說者皆以維鵜喻小人在位頗似費解然從來如此如楚詞九思鵜集兮帷幄類張風林曰淮南子齊俗訓曰鵜鶘飲水數斗而不足雖指能竭澤言然亦寓貪得意鳲鳩鳲鳩在桑其子七兮鳲鳩鴶鵴也亦名戴勝今之布榖也飼子朝從上下暮從下上平均如一鳩見前此名鳲鳩即禽經拙鳩召南所云居鵲巢者原有戴勝鴶鵴布榖諸名然總名鴝鵒春秋𫝊以鳲鳩氏為司空正以鴝鵒無定居或穴或巢有似乎司空之平民居不一其地者其曰在桑非巢于桑以春月椹熟值生子之候多集于桑氓詩所云無食桑椹月令所云戴勝降于桑與此在桑正合故揚雄謂鳲鳩即戴勝而孔頴逹非之此孔氏誤也若其云子七則祗以一與七韻原非限數鳩子不限七也乃毛傳又增其說云鳩之養子朝從上下暮從下上平均如一夫詩並不云養子徒揣下文有儀一句謂養子平一可與其儀之一相比較耳實則七一異數數以異相較鳩子有七而君子之儀則一相形咏嘆不必相等下章鳩子在棘未嘗曰君子之儀亦在棘也且鴝鵒生子世嘗取養之兒童習見並無安排上下朝暮異飼之事徐仲山日記云說詩使可安鳲鳩穴居且不定間占鵲巢居之乃曰養子有上下朝下飼而暮上飼使穴居耶穴無有七重土隔可容疊居者巢居耶世亦安得有步階之木分七橫枝如拾級而使子往之豳風七月有鳴倉庚倉庚黃鳥也黃鳥見前但此鳥有十餘名而總以其色稱如黧黃黃鸝皆以一黃一黑為名惟此倉庚不可解舊注倉為榖藏倉黃者榖熟之色則倉本黃色而又與蒼通月令駕倉龍漢陳勝𫝊倉頭軍蕭望之𫝊倉頭廬兒皆以蒼為倉而蒼即是黃則黧黃也庚者更時之鳥也若其又作商庚商倉音訛亦作鶬鶊此正以鳥部字增鳥傍者說見前七月鳴鶪鶪伯勞也鶪爾雅作伯勞說文作博勞春秋𫝊作伯趙其又名鶪以其聲鶪鶪然也然又作題鴂以鶪鴂通字也特鶪以鳴顯曰鳴鶪則其鳴有時而此云七月與月令仲夏鶪始鳴不合因之有謂周正七月即夏正五月者然而詩文多用夏正豳風亦然不應此一物獨改周正鄭𤣥謂豳地晚寒故物候較晚則豳在雍岐之北早寒有之焉得晚寒于是王肅直斷曰七月是五月之誤殊不知鶪鳴之時諸書顯然春秋𫝊以伯趙氏為司至之鳥謂其夏至鳴冬至止故名司至則夏至原是仲夏亦正是五月故易通卦驗云博勞夏至應隂而鳴冬至而止帝少皥以為司至之官而樊光爾雅注亦云伯趙司空以夏至來冬至去是以大戴禮五月鶪鳴逸周書芒種又五日鶪始鳴則鶪鳴始于五月而終于十一月此先後一詞者其云七月非謂至是始鳴特以七月之鳴起下文八月之績謂鶪是隂鳥鳴則隂生所當戒隂寒而興女工故特以七八月為戒寒之候蔡雍所云鶪應時而鳴是為隂候楚詞恐鶗鴂之先鳴兮使百草為之不芳是也但此鳥罕見世多妄指即顔師古注漢書猶以鶪訛鴂目為子規况其他紛紛總不可慿而近作字書者乃引通雅邪說謂即姑惡苦吻鳥且謂蘇軾稱姑惡水鳥為非侃侃然辨之夫蘇軾原非博雅即鶴且不識賦稱𤣥裳何况他鳥但姑惡實非鶪曹植惡鳥論明云鶪鳴鶪鶪孔氏疏亦然故云鶪以鳴為名鶪鶪與苦苦猶大不類若姑惡則相去遠矣况張華注禽經謂伯勞似鴝鵒祗鴝鵒喙黃伯勞喙黑今姑惡項有細毛羽不純黑不類鴝鵒又且古詞以伯勞與燕相較有云東飛伯勞西飛燕謂燕以仲春來仲秋去而鶪以仲夏來仲冬去來去相背故曰東西飛今姑惡實水鳥長見水裔于冬春未嘗去也即姑惡之鳴亦多在夏不過以芒種水田喜于鳴游實則姑惡在水裔亦偶有冬春時一發聲者安得以鳴鶪混之鴟梟鴟梟鴟梟既取我子無毁我室鴟梟鵂鶹惡鳥攫鳥子而食者也鴟梟見前一名怪鴟晝常伏處至夜每出攫他鳥子以為食莊子所謂晝則瞑目夜能撮蚤察毫末者以其警敏故楚詞稱􅬠鳥是也此詩係周公所作見尚書金縢篇其云取子云毁室必于物理無少忤者爾雅以鴟梟為鸋鴂而郭璞陸璣輩爭以鷦鷯小鳥當之其可通乎尚書居東豳風東征尚千古聚訟祗鴟梟一鳥一以為􅬠鳥則比祿父及殷頑一以為鷦鷯則周自比亦復聚訟不輟夫以殷小腆叛大邑周在尚書大誥已明言之今自比小鳥已是難通况解經須讀經鴟梟之名見于金縢金縢曰周公居東二年則罪人斯得于後公乃為詩以貽王名之曰鴟梟據舊𫝊是時祿父已受誅所謂罪人者指祿父也因而貽之以鴟梟之詩則此鴟梟者正承罪人祿父言謂罪人雖得而其所為可慮者尚未已也乃于是更請讀詩詩曰鴟梟鴟梟既取我子無毁我室繹其詞則謂彼祿父者既誘我二叔而殺之矣得無再毁我室耶夫鬻子已可閔况毁室耶此正告之以殷頑當遷淮夷商奄當預防也則是取子者鴟梟也恐其毁室者亦鴟梟也呼名相告詩文皎然乃以之自比則自呼其名而忽接之曰取子曰毁室將所謂取者誰取之而所謂毁者又誰毁之况讀詩須讀全詩鴟梟之詩周公貽王所作也謂殷頑可患也周頌小毖之詩則王已悔悟而作之以自毖者謂祿父固可懲殷頑更當毖也所謂懲而毖後患也惟然則公以鴟梟為警而王又即以鷦鷯毖之謂大固當慮小亦不可忽兩詩前後比興俱得向使周公以鷦鷯自比貽之成王而成王之因此而悔悟者乃翻以鷦鷯之自比者推而比之祿父殷頑天下亦何物不可取譬而一君一臣必取此小物之擬非其倫者既以自指又復指他既曰可閔又曰可懲復可患于彼于此展轉眩亂天下安有此經文矣張風林曰自爾雅有鴟梟鸋鴂之文而注之者曰鸋鴂即鷦鷯也因之詩傳詩疏亦儼以鴟梟為小鳥文選張士烈為諸孫置守冡人表曰鴟梟恤功愛子及室劉良注云鴟梟鳥名言此鳥憂毁其室則自晉唐後其以鴟梟為鷦鷯比比然矣按鴟梟即快降鳥鷦鷯即黃脰鳥詩鳥名不易識惟此二鳥則老稚男女無不共見共識之而猶迷惑不自信是非援經以正之不可矣經解例曰解經者必以經證經雖小物亦然東山鸛鳴于垤鸛水鳥似鶴者也垤蟻塜也將隂雨則穴處者先知故蟻出垤而鸛就食遂鳴于其上也鸛似鶴而頂不赤項無烏帶惟尾翼俱黑善食魚禽經鸛仰鳴則晴俯鳴則雨今苐鳴垤不辨俯仰其為晴為雨不必問也但鳴垤為蟻穴知雨雨必出垤而鸛就食之則不然禽凡短咮者能啄蟲豸謂之噣食豈有大鳥長喙而能噣及蚍蟻者誤矣若又名鸛雀以舊注鸛鵲屬故莊子稱觀雀後漢楊震𫝊稱冠雀皆即此物以古多通字冠觀與鸛但取音同不必有義也乃近作字書者反概從非之又不能實指其所以非字學從此反貿亂矣按楊震𫝊有冠雀銜三鱣集講堂考所謂鱣即今之鱔魚一名蛇魚荀子所云魚鱉鰍鱣者身長尺餘其形如蛇故當時都講生亦以蛇鱔名之此雖十有頂之雀不能銜一鱣况三鱣乎且天下未聞有食魚雀也若觀雀則不惟音同兼且有義徐氏日記曰鸛凡食魚必且觀且行因名為鸛朝野僉載記魏光乘授左拾遺譏訕姚元之身長而行急人目之為趂地鸛謂不觀而但趂地也則鸛名觀雀莊子非妄稱者詩貴識名安可以顯然有據之名而反排棄之九罭鴻飛遵渚鴻見前小雅四牡翩翩者隼隼夫不也今鵓鳩也凡鳥之短尾者皆隼屬隼與隹同毛𫝊作夫不爾雅作鳺鴀總是一名特此是鳩屬郭璞作䳕鳩李巡作楚鳩其餘鳩名尚多惟春秋𫝊以隼為祝鳩作司徒官而杜預謂祝鳩即鷦鳩孝鳥也司徒以教孝為職與此詩比將父將母恰合則此祝鳩是正名若又云凡鳥短尾皆隼屬雖本說文然反屬泛指非詩意矣但說文既出隼字為祝鳩而又特注曰思允切則此祝鳩之隼非凡短尾鳥之隼不讀錐而讀筍與隼同音故下即出隼字旋注曰隼或從隹一以為隼聲同隼故即從隼下加一以造此隼字非謂隼即是隼也其又曰一曰鶉字者以鶉與同字而鳥名雕與隼為類因之本讀團而當其書鶉則間一讀隼故一曰鶉字以為鶉與隼不類而亦有隼音非謂鶉即是隼也此但注祝鳩而連出隼字轉見鶉字並不謂隼鶉祝鳩合作一物而唐孫强補顧氏玉篇于隼隼二字下皆注曰祝鳩而宋時作廣韻者且謂祝鳩與隼同是鷙鳥此本後來字書之誤而或舉以咎說文且謂杜氏鷦鳩總由說文隹一二字而誤併焦字則展轉寃誣矣若朱注作鵓鳩又一本作鶉鳩則在祝鳩鷦鳩十數名外並無此二名此必有誤者至于鶉之非隼并非隼見後匪鶉匪鳶詩常棣脊令在原脊令雍渠水鳥也脊令即鶺鴒爾雅玉篇詩書亦作䳭鴒禽經曰䳭鴒友悌此以舊注脊令凡共母者飛鳴不相離又且飛則鳴行則搖有似兄弟急難故也但並非水鳥陸璣謂鶺鴒大如鷃雀背青赤色腹下白頭下有黑如連錢廣韻亦云頸下有錢文名為錢母然往往于原隰中見之而水際則絶無有不知毛𫝊爾雅郭注何以俱指之為雍渠水鳥亦不可解若函史直以為鷖則從水鳥之誤而又誤者詩明云在原何不就詩本文求之南有嘉魚翩翩者隼隼見前采芑鴥彼飛隼隼者鷂屬急疾之鳥也隼鷙鳥也即鷹之小者陸佃云鷹搏噬不能無失獨隼為有凖每發必中故凖字從隼齊人謂之擊征或謂之題肩餘見翩翩者隼詩鴻雁鴻雁于飛大曰鴻小曰雁鴻雁見前皆水鳥雖同族而自為一類說文大曰鴻小曰雁謂鴻類較雁大雁類較鴻小耳特是經𫝊所稱每連出二字如月令鴻以八月至稱鴻雁雁以九月至亦稱鴻雁類有時以鴻稱鴻雁雁仍稱雁如淮南子仲秋來者是鴻稱鴻雁季秋來者是雁則稱候雁類沔水鴥彼飛隼隼見前鶴鳴鶴鳴于九臯鶴鳥名長頸竦身髙腳頂赤身白頸尾俱黑其鳴髙亮聞八九里鶴水鳥名舊注鶴大于鵠而頂赤頸黑翼青尾白惟鳴聲逺聞雖鳴亦稱唳禽經所云以潔唳史云華亭鶴唳獨易稱鳴鶴在隂與此鶴鳴同臯者澤也九臯即九澤禹貢九澤既陂大概舉多澤言之如九川九淵類祗其云澤以鶴好食魚漢書亭臯千里顔注為亭堠于臯隰中謂水涯地也張風林曰王逸楚詞注澤曲曰臯李善文選注水田曰臯若五臣吕向注臯澤也集注凡鳥獸草木盡襲舊注而一往多誤惟此鶴則時所習見疑翼青尾白為非是遂奮改曰頸尾黑以其所見者是立鶴立則斂翼垂凥其帔黝然實未嘗揭兩翮而見其尾也明儒陳晦伯作經典稽疑調笑之曰其黑者尾耶黃鳥黃鳥黃鳥黃鳥見前正月誰知烏之雌雄烏之雌雄相似而難辨者也鳥之雌雄皆相似難辨何止于烏但鳥或以首尾毛色稍為分别烏則墨然矣故爾雅特著一辨雌雄法謂凡鳥雌雄皆辨以翼右掩左雄左掩右雌今既墨然則雖相掩亦誰辨之餘見前小宛宛彼鳴鳩翰飛戾天嗚鳩班鳩也鳴鳩毛𫝊作鶻鳩其稱鳴鳩者以此鳩多聲每呼則必戛其羽即月令所云鳴鳩拂其羽者若其稱鶻鳩則世並不解往講學龍山或謂鳴鳩非鶻鳩且謂鳩飛必不能戾天况今鳴鳩則其飛世皆見之雖不必如鷽鳩莊子所云抉起即控地者然故鳩也鳩飛安能戾天乎張南士曰戾天有二鳶之戾天則回翔天際負青雲而遙此一戾也鳩之戾天則不能扶搖偶一竄入于青霄之內决眥不及有如鶻然不見唐人試士題有出籠鶻乎其取中之詩有云一㸃青霄裏千聲碧落中此又一戾也此鳩名鶻鳩則所謂鶻者正如是矣舉坐稱嘆則是鶻鳩之名因此詩而見今注此詩而但取班鳩反舍鶻鳩何其疏也若許叔重注說文有云鳴鳩奮迅其羽直刺上飛數千丈入雲中此亦精于釋鳥者又江東習俗辦鳩鈴取薄筍管縳鵓鳩足放之傍雲而飛則其聲泠然亦戾天之驗題彼脊令題視也脊令飛則鳴行則搖脊令見前苐以下文毋忝所生觀之則禽經鶺鴒友悌舊注鶺鴒共母者必飛鳴相隨當據其說不止飛鳴行搖已也唐𤣥宗時有脊令數十集麟德殿頌者以為此天子友悌之瑞此正己事可證者續詩傳鳥名卷卷二
