body:
  text: 續詩傳鳥名卷詩類提要臣等謹案續詩傳鳥名卷三卷國朝毛竒齡撰竒齡作毛詩續傳以避仇佚之後從鄰人吳氏子得卷末鳥名一卷與其門人莫春園張文檒共緝綴之衍為三卷大意在續毛訓而正朱傳每條皆先列集傳之文於前而一一辨其得失考訓釋毛詩草木蟲魚者自吳陸璣以後作者實繁朱子作詩集傳大旨在發明美刺之旨而名物訓詁則其所略竒齡此書則惟以考證為主故其説較詳惟恃其博辨往往于朱子集傳多所吹求而所言亦不免于踈舛如竒齡所作毛詩省篇既以齊風雞鳴為讒人此書又用舊説為賢妃之告旦前後自相矛盾鷦鷯之名桃蟲猶竊脂之名桑扈原不因水而名竒齡乃謂所棲所食俱不在桃以喙鋭如錐專剖葦中蟲食之謂之掏蟲掏桃字通尤杜撰無理至于解睍睆黃鳥用毛萇舊訓于義本長乃謂鶯字從二目一八其二目者離二之目一八者艮八之喙又謂鶯字從二火離為目目本離火尚書洪範伏傳以五事之目屬五行之火鶯首之戴兩火即鶯之戴兩目此雖王安石之字説不穿鑿至此矣然大致引證賅洽頗多有據録而存之以廣考訂固不害于多識之義爾乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a378a08749e280e8d70b914e81b0a84ac2c3a5ab52fa9a0ab75c7a22670ef96b
